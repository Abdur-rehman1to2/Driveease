name: semester_project
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# ✅ dependencies must be at ROOT level, not inside 'flutter:'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.6.0
  image_picker: ^1.0.7
  intl: ^0.18.1
  http: ^1.1.0
  flutter_dotenv: ^5.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# ✅ flutter section is separate at the bottom
flutter:
  uses-material-design: true
  assets:
    - assets/img/
    - .env
